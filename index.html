*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6f8;color:#222;line-height:1.5;padding-bottom:80px;min-height:100vh}
a{text-decoration:none;color:inherit}

/* HEADER */
.header{background:#192a4a;color:#fff;text-align:center;padding:20px 16px 14px}
.header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.header h1 span{opacity:.75;font-weight:400}
.header .sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:4px}
.header .note{font-size:10px;background:rgba(255,255,255,.1);display:inline-block;padding:2px 10px;border-radius:8px;margin-top:6px;color:rgba(255,255,255,.6)}

/* SEARCH */
.search-wrap{max-width:800px;margin:14px auto 10px;padding:0 14px}
.search-wrap input{width:100%;padding:9px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#333;font-size:13px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:#2596ff}

/* FILTER BAR */
.filter-wrap{max-width:800px;margin:0 auto 10px;padding:0 14px}
.filter{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 16px;border-radius:16px;border:1px solid #e0e0e0;background:#fff;color:#666;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.filter-btn.active{background:#2596ff;border-color:#2596ff;color:#fff}
.filter-btn:hover:not(.active){border-color:#bbb;color:#333}

/* STOCK LINK */
.stock-link{text-align:right;max-width:800px;margin:0 auto 6px;padding:0 14px}
.stock-link a{font-size:11px;color:#2596ff;font-weight:500}
.stock-link a:hover{text-decoration:underline}

/* PRODUCT LIST */
.list-wrap{max-width:800px;margin:0 auto;padding:0 14px}

.prod-group{border-bottom:1px solid #eee}
.prod-row{display:flex;align-items:center;padding:10px 8px;cursor:pointer;gap:8px;transition:background .15s;user-select:none}
.prod-row:hover{background:#fff}
.prod-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prod-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.prod-name{font-size:13px;font-weight:600;color:#222}
.prod-count{font-size:10px;color:#999;background:#f0f0f0;padding:1px 7px;border-radius:8px;font-weight:500}
.prod-cat-tag{font-size:9px;color:#999;font-weight:400}
.prod-price{font-size:14px;font-weight:600;color:#222;flex-shrink:0;margin-left:auto;margin-right:6px}
.prod-arrow{font-size:10px;color:#aaa;transition:transform .2s;flex-shrink:0;width:16px;text-align:center}
.prod-arrow.open{transform:rotate(180deg)}

/* EXPANDED VARIANTS */
.prod-variants{display:none;background:#fafbfc;border-top:1px solid #f0f0f0}
.prod-variants.open{display:block}
.var-row{display:flex;align-items:center;padding:7px 8px 7px 26px;gap:8px;font-size:12px}
.var-row:hover{background:#f0f2f5}
.var-code{color:#888;font-weight:500;min-width:36px}
.var-spec{color:#888;min-width:0}
.var-price{font-weight:600;color:#222;margin-left:auto;flex-shrink:0}
.var-add{background:#2596ff;border:none;border-radius:6px;padding:4px 10px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:background .15s;flex-shrink:0}
.var-add:hover{background:#1a7fe8}
.var-add.in-cart{background:#33cc88}

/* CART SECTION */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:8px 14px;display:flex;align-items:center;gap:10px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.cart-bar .cart-info{flex:1;font-size:12px;color:#666}
.cart-bar .cart-info strong{color:#222;font-size:14px}
.cart-bar .view-cart{background:#2596ff;border:none;border-radius:8px;padding:8px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.cart-bar .view-cart:hover{background:#1a7fe8}
.cart-bar .view-cart:active{transform:scale(.97)}

/* CART DRAWER */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;justify-content:center;align-items:flex-end}
.cart-overlay.open{display:flex}
.cart-drawer{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:70vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eee}
.cart-hdr h3{font-size:15px;font-weight:700}
.cart-hdr button{width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:transparent;color:#888;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:4px 0}
.cart-empty{text-align:center;padding:30px 20px;color:#aaa;font-size:13px}
.cart-item{display:flex;align-items:center;padding:8px 16px;gap:8px;border-bottom:1px solid #f5f5f5}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12px;font-weight:600}
.cart-item-spec{font-size:10px;color:#999;margin-top:1px}
.cart-qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
.cart-qty button{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:transparent;color:#666;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-qty span{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.cart-item-total{font-size:12px;font-weight:600;color:#2596ff;min-width:44px;text-align:right}
.cart-ftr{border-top:1px solid #eee;padding:12px 16px}
.cart-total{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;margin-bottom:8px}
.cart-total .total-price{color:#2596ff;font-size:17px}
.cart-actions{display:flex;gap:6px}
.btn-confirm{flex:1;padding:10px;border-radius:8px;border:none;background:#25D366;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-clear{padding:10px 14px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#888;font-size:12px;font-weight:500;cursor:pointer}

/* ORDER MODAL */
.order-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;justify-content:center;align-items:center;padding:20px}
.order-overlay.open{display:flex}
.order-modal{background:#fff;border-radius:14px;width:100%;max-width:400px;padding:24px 20px 16px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.order-modal h2{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px}
.order-modal .sub{text-align:center;font-size:12px;color:#999;margin-bottom:14px}
.order-box{background:#f8f9fa;border-radius:10px;padding:14px;margin-bottom:10px;max-height:180px;overflow-y:auto}
.order-line{font-size:12px;padding:3px 0;color:#444;font-family:monospace;line-height:1.5}
.order-total-line{border-top:1px solid #ddd;margin-top:6px;padding-top:6px;font-size:13px;font-weight:700;text-align:right;color:#2596ff}
.whatsapp-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#25D366;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

.order-close{margin-top:10px;background:none;border:none;color:#aaa;font-size:11px;cursor:pointer;width:100%;text-align:center;padding:4px}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:16px;font-size:12px;font-weight:500;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
.toast.success{background:#33cc88}

/* FOOTER */
.footer{text-align:center;padding:20px 14px 60px;max-width:800px;margin:0 auto;font-size:11px;color:#999;line-height:1.8;border-top:1px solid #eee;margin-top:20px}

// === 状态 ===
let cart = {};
let currentCat = "all";

(function(){try{const d=JSON.parse(localStorage.getItem("vitara_cart")||"{}");cart=d}catch(e){}})();
function save(){localStorage.setItem("vitara_cart",JSON.stringify(cart))}

// 按名称分组，同名的归为一个组
function groupProducts(list){
  const map={};
  list.forEach(p=>{
    if(!map[p.name]) map[p.name]={name:p.name,cat:p.cat,items:[]};
    map[p.name].items.push(p);
  });
  return Object.values(map);
}

function render(){
  const el=document.getElementById("productList");
  let items=products;
  if(currentCat!=="all") items=items.filter(p=>p.cat===currentCat);
  const s=document.getElementById("searchInput").value.trim().toLowerCase();
  if(s) items=items.filter(p=>p.name.toLowerCase().includes(s)||p.code.toLowerCase().includes(s));

  if(!items.length){
    el.innerHTML='<div style="text-align:center;padding:60px 20px;color:#999;font-size:13px">🔍 No products found</div>';
    return;
  }

  const groups=groupProducts(items);
  el.innerHTML=groups.map((g,i)=>{
    const dot=dotColors[g.cat]||"#888";
    const catTag=CAT_NAMES[g.cat]||g.cat;
    const minPrice=Math.min(...g.items.map(p=>p.price));
    const maxPrice=Math.max(...g.items.map(p=>p.price));
    const priceStr=maxPrice>minPrice?`$${minPrice}-$${maxPrice}`:`$${minPrice}`;
    const count=g.items.length;
    // 有多少个不同规格/价格
    const variantCount=count;

    const variantsHtml=g.items.map(p=>{
      const inc=!!cart[p.code],qty=cart[p.code]||0;
      return `<div class="var-row">
        <span class="var-code">#${p.code}</span>
        <span class="var-spec">${p.spec}</span>
        <span class="var-price">$${p.price}</span>
        <button class="var-add${inc?' in-cart':''}" onclick="event.stopPropagation();addToCart('${p.code}')">${inc?'✓ '+qty:'Add'}</button>
      </div>`;
    }).join("");

    return `<div class="prod-group">
      <div class="prod-row" onclick="toggleGroup(this)">
        <span class="prod-dot" style="background:${dot}"></span>
        <div class="prod-info">
          <span class="prod-name">${g.name}</span>
          ${count>1?`<span class="prod-count">${variantCount} specs</span>`:''}
          <span class="prod-cat-tag">${catTag}</span>
        </div>
        <span class="prod-price">${priceStr}</span>
        <span class="prod-arrow">▼</span>
      </div>
      <div class="prod-variants">${variantsHtml}</div>
    </div>`;
  }).join("");
}

function toggleGroup(row){
  const variants=row.nextElementSibling;
  const arrow=row.querySelector('.prod-arrow');
  const isOpen=variants.classList.contains('open');
  variants.classList.toggle('open');
  arrow.classList.toggle('open');
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.cat===cat));
  render();
}

function addToCart(code){
  if(!cart[code]) cart[code]=0;
  cart[code]++;
  save();
  updateUI();
  renderCart();
  render();
  toast("+1 "+products.find(p=>p.code===code).name,true);
}

function removeFromCart(code){
  if(!cart[code]) return;
  cart[code]--;
  if(cart[code]<=0) delete cart[code];
  save(); updateUI(); renderCart(); render();
}

function clearCart(){cart={};save();updateUI();renderCart();render();toast("Cart cleared")}
function totalCount(){return Object.values(cart).reduce((a,b)=>a+b,0)}
function totalPrice(){return Object.entries(cart).reduce((s,[c,q])=>s+q*(products.find(p=>p.code===c)?.price||0),0)}

function updateUI(){
  const n=totalCount();
  const bar=document.getElementById("cartBar");
  if(n>0){
    bar.style.display="flex";
    document.getElementById("cartSummary").textContent=n+" items";
    document.getElementById("cartTotalBar").textContent="$"+totalPrice();
  } else {
    bar.style.display="none";
  }
  document.getElementById("cartTotalDrawer").textContent="$"+totalPrice();
}

function renderCart(){
  const el=document.getElementById("cartItems");
  const items=Object.entries(cart);
  if(!items.length){el.innerHTML='<div class="cart-empty">Cart is empty</div>';return}
  el.innerHTML=items.map(([c,q])=>{
    const p=products.find(x=>x.code===c);
    if(!p)return"";
    return `<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-spec">#${c} · ${p.spec} · $${p.price}/box</div></div><div class="cart-qty"><button onclick="removeFromCart('${c}')">−</button><span>${q}</span><button onclick="addToCart('${c}')">+</button></div><span class="cart-item-total">$${q*p.price}</span></div>`
  }).join("");
}

function toggleCart(){
  const o=document.getElementById("cartOverlay");
  if(o.classList.contains("open")){o.classList.remove("open");return}
  renderCart();o.classList.add("open");
}

function openOrderModal(){
  const items=Object.entries(cart);if(!items.length){toast("Cart is empty");return}
  document.getElementById("cartOverlay").classList.remove("open");
  const box=document.getElementById("orderBox");
  box.innerHTML=items.map(([c,q])=>{const p=products.find(x=>x.code===c);if(!p)return"";return`<div class="order-line">${p.name} (#${p.code}) — ${p.spec} × ${q} boxes = $${q*p.price}</div>`}).join("")+`<div class="order-total-line">Total: $${totalPrice()} (${totalCount()} boxes)</div>`;
  document.getElementById("orderOverlay").classList.add("open");
}
function closeOrderModal(){document.getElementById("orderOverlay").classList.remove("open")}
function buildOrderText(){const items=Object.entries(cart);let t="=== New Order ===\n\n";items.forEach(([c,q],i)=>{const p=products.find(x=>x.code===c);if(!p)return;t+=`${i+1}. ${p.name} (#${p.code})\n   ${p.spec} × ${q} boxes = $${q*p.price}\n\n`});t+=`──────────────\nTotal: $${totalPrice()}\nItems: ${totalCount()} boxes\n──────────────\n\nThank you!`;return t}
function sendWhatsApp(){window.open("https://wa.me/1234567890?text="+encodeURIComponent(buildOrderText()),"_blank")}
function copyOrder(){const t=buildOrderText();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>{toast("✅ Copied!",true);document.querySelector(".copy-btn").textContent="✅ Copied!";setTimeout(()=>document.querySelector(".copy-btn").textContent="📋 Copy Order",2000)}).catch(()=>fallbackCopy(t))}else{fallbackCopy(t)}}
function fallbackCopy(t){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("✅ Copied!",true)}catch(e){toast("⚠️ Copy failed")}document.body.removeChild(ta)}
function toast(msg,important){const t=document.getElementById("toast");t.textContent=msg;t.className="toast"+(msg.includes("✅")?" success":"");t.classList.add("show");clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove("show"),important?2500:1800)}

render();updateUI();
</script>
