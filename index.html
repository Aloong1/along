<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Research Peptides — 高品质科研肽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f; --card:rgba(255,255,255,.03); --card-hover:rgba(255,255,255,.06);
  --text:#fff; --text2:rgba(255,255,255,.7); --text3:rgba(255,255,255,.35);
  --border:rgba(255,255,255,.08); --border-hover:rgba(255,255,255,.15);
  --accent:#6c5ce7; --accent2:#a29bfe; --accent-dim:rgba(108,92,231,.15);
  --green:#00b894; --red:#ff7675; --gold:#fdcb6e;
}
body{font-family:-apple-system,'Inter','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:80px;min-height:100vh}
a{text-decoration:none;color:inherit}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto;position:sticky;top:0;background:rgba(10,10,15,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);z-index:50}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.logo small{font-size:11px;font-weight:400;color:var(--text3);margin-left:6px}
.nav{display:flex;gap:20px;font-size:12px;color:var(--text3);font-weight:600}
.nav a:hover{color:var(--text)}
.cart-btn{background:var(--accent-dim);border:1px solid rgba(108,92,231,.25);border-radius:18px;padding:7px 14px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:700;transition:all .2s}
.cart-btn:hover{background:rgba(108,92,231,.25)}
.cart-btn .count{background:var(--accent);border-radius:50%;width:18px;height:18px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
.hero{text-align:center;padding:50px 20px 32px;max-width:680px;margin:0 auto}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1.2}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text3);font-size:13px;margin-top:10px;line-height:1.6}
.badges{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.badges span{font-size:10px;color:var(--text3);border:1px solid var(--border);padding:4px 12px;border-radius:10px;font-weight:600}
.search-wrap{max-width:1200px;margin:0 auto;padding:0 20px 16px}
.search-wrap input{width:100%;padding:10px 16px;border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:13px;outline:none;transition:all .2s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent);background:rgba(108,92,231,.06)}
.filter{display:flex;gap:6px;padding:0 20px;max-width:1200px;margin:0 auto 20px;flex-wrap:wrap;overflow-x:auto}
.filter-btn{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn:hover:not(.active){border-color:var(--border-hover);color:var(--text2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;max-width:1200px;margin:0 auto;padding:0 20px 40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .3s;position:relative;cursor:pointer}
.card:hover{border-color:rgba(108,92,231,.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,92,231,.08);background:var(--card-hover)}
.card .icon{height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;margin-bottom:8px}
.card h3{font-size:14px;font-weight:700;margin-bottom:3px}
.card .code{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:8px}
.card .cat-tag{display:inline-block;font-size:9px;color:var(--text3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:4px;margin-bottom:10px}
.card .bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.card .price{font-size:18px;font-weight:800}
.card .price small{font-size:11px;color:var(--text3);font-weight:400}
.card .add{background:var(--accent);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.card .add:hover{background:#5a4bd1;transform:scale(1.02)}
.card .add:active{transform:scale(.97)}
.card .add.in-cart{background:var(--green)}
.footer{text-align:center;padding:24px 20px;border-top:1px solid var(--border);max-width:1200px;margin:0 auto;font-size:11px;color:var(--text3);line-height:1.8}
.footer strong{color:var(--text2);font-weight:700}
.cart-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(108,92,231,.4);z-index:100;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cart-fab:active{transform:scale(.92)}
.cart-fab .cart-badge{position:absolute;top:-4px;right:-4px;min-width:22px;height:22px;border-radius:11px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg);display:none}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;justify-content:center;align-items:flex-end}
.cart-overlay.open{display:flex}
.cart-drawer{background:#12121a;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:75vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cart-hdr h3{font-size:15px;font-weight:800}
.cart-hdr button{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:4px 0}
.cart-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.cart-item{display:flex;align-items:center;padding:12px 20px;gap:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12px;font-weight:700}
.cart-item-spec{font-size:10px;color:var(--text3);margin-top:2px}
.cart-qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cart-qty button{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.cart-qty button:active{background:rgba(255,255,255,.08)}
.cart-qty span{font-size:13px;font-weight:700;min-width:20px;text-align:center}
.cart-item-total{font-size:12px;font-weight:700;color:var(--accent2);min-width:48px;text-align:right}
.cart-ftr{border-top:1px solid var(--border);padding:16px 20px}
.cart-total{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:800;margin-bottom:10px}
.cart-total .total-price{color:var(--accent2);font-size:18px}
.cart-actions{display:flex;gap:8px}
.btn-confirm{flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-confirm:active{background:#5a4bd1}
.btn-clear{padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-clear:active{background:rgba(255,255,255,.06)}
.order-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;justify-content:center;align-items:center;padding:20px}
.order-overlay.open{display:flex}
.order-modal{background:#12121a;border-radius:20px;width:100%;max-width:420px;padding:28px 24px 20px;animation:fadeIn .3s ease;border:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.order-modal h2{font-size:18px;font-weight:800;text-align:center;margin-bottom:6px}
.order-modal .sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:16px}
.order-box{background:rgba(255,255,255,.04);border-radius:12px;padding:16px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.order-line{font-size:12px;padding:4px 0;color:var(--text2);font-family:monospace;line-height:1.5}
.order-total-line{border-top:1px solid var(--border);margin-top:8px;padding-top:8px;font-size:13px;font-weight:700;text-align:right;color:var(--accent2)}
.whatsapp-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#25D366;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:4px}
.whatsapp-btn:hover{background:#20bd5a}
.whatsapp-btn:active{transform:scale(.98)}
.copy-btn{width:100%;margin-top:8px;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.copy-btn:active{background:rgba(255,255,255,.06)}
.order-close{margin-top:12px;background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;width:100%;text-align:center;padding:4px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:20px;font-size:12px;font-weight:700;z-index:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}
.toast.success{background:#00b894;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast.error{background:#ff7675;box-shadow:0 8px 32px rgba(255,118,117,.3)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.empty-state .big{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 40px}
  .hero h1{font-size:24px}
  .header{padding:12px 16px}
  .logo{font-size:16px}
  .nav{display:none}
  .cart-fab{width:48px;height:48px;font-size:18px;bottom:16px;right:16px}
  .filter{padding:0 12px;gap:5px}
  .filter-btn{padding:6px 14px;font-size:10px}
  .search-wrap{padding:0 12px 12px}
}
</style>
</head>

let cart={};
let currentCat="all";
let searchTerm="";

const CAT_NAMES={glp1:"⚖️ GLP-1 / 减重",gh:"📈 GHRP / 生长激素",repair:"🔧 修复再生",antiage:"🛡 抗衰 / 抗氧化",skincare:"💎 护肤美容",supplies:"🧪 实验室耗材",research:"🔬 其他研究肽"};

(function(){try{const d=JSON.parse(localStorage.getItem("vitara_cart")||"{}");cart=d}catch(e){}})();
function save(){localStorage.setItem("vitara_cart",JSON.stringify(cart))}

function render(){
  const grid=document.getElementById("productGrid");
  let items=products;
  if(currentCat!=="all")items=items.filter(p=>p.cat===currentCat);
  const s=document.getElementById("searchInput").value.trim().toLowerCase();
  if(s)items=items.filter(p=>p.name.toLowerCase().includes(s)||p.code.toLowerCase().includes(s));
  if(!items.length){grid.innerHTML='<div class="empty-state"><div class="big">🔍</div><p>未找到相关产品</p></div>';return}
  grid.innerHTML=items.map(p=>{
    const inc=!!cart[p.code],qty=cart[p.code]||0;
    return `<div class="card"><div class="icon">${p.icon||"🧬"}</div><h3>${p.name}</h3><div class="code">#${p.code}</div><span class="cat-tag">${CAT_NAMES[p.cat]||p.cat}</span><div class="bottom"><div class="price">$${p.price} <small>/盒</small></div><button class="add${inc?" in-cart":""}" onclick="event.stopPropagation();addToCart('${p.code}')">${inc?"✓ "+qty:"加入"}</button></div></div>`
  }).join("");
}

function setCat(cat){currentCat=cat;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.cat===cat));render()}
function addToCart(code){if(!cart[code])cart[code]=0;cart[code]++;save();updateUI();renderCart();render();toast("+1 "+products.find(p=>p.code===code).name,true)}
function removeFromCart(code){if(!cart[code])return;cart[code]--;if(cart[code]<=0)delete cart[code];save();updateUI();renderCart();render()}
function clearCart(){cart={};save();updateUI();renderCart();render();toast("购物车已清空")}
function totalCount(){return Object.values(cart).reduce((a,b)=>a+b,0)}
function totalPrice(){return Object.entries(cart).reduce((s,[c,q])=>s+q*(products.find(p=>p.code===c)?.price||0),0)}
function updateUI(){const n=totalCount();document.getElementById("headerCount").textContent=n;const b=document.getElementById("fabBadge");if(n>0){b.style.display="flex";b.textContent=n}else{b.style.display="none"}document.getElementById("cartTotal").textContent="$"+totalPrice()}
function renderCart(){const el=document.getElementById("cartItems");const items=Object.entries(cart);if(!items.length){el.innerHTML='<div class="cart-empty">购物车是空的</div>';return}el.innerHTML=items.map(([c,q])=>{const p=products.find(x=>x.code===c);if(!p)return"";return`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${p.name}</div><div class="cart-item-spec">#${c} · ${p.spec} · $${p.price}/盒</div></div><div class="cart-qty"><button onclick="removeFromCart('${c}')">−</button><span>${q}</span><button onclick="addToCart('${c}')">+</button></div><span class="cart-item-total">$${q*p.price}</span></div>`}).join("")}
function toggleCart(){const o=document.getElementById("cartOverlay");if(o.classList.contains("open")){o.classList.remove("open");return}renderCart();o.classList.add("open")}

function openOrderModal(){
  const items=Object.entries(cart);if(!items.length){toast("购物车是空的");return}
  document.getElementById("cartOverlay").classList.remove("open");
  const box=document.getElementById("orderBox");
  box.innerHTML=items.map(([c,q])=>{const p=products.find(x=>x.code===c);if(!p)return"";return`<div class="order-line">${p.name} (#${p.code}) — ${p.spec} × ${q} 盒 = $${q*p.price}</div>`}).join("")+`<div class="order-total-line">合计: $${totalPrice()}（共 ${totalCount()} 盒）</div>`;
  document.getElementById("orderOverlay").classList.add("open");
}
function closeOrderModal(){document.getElementById("orderOverlay").classList.remove("open")}
function buildOrderText(){const items=Object.entries(cart);let t="=== 新订单 ===\n\n";items.forEach(([c,q],i)=>{const p=products.find(x=>x.code===c);if(!p)return;t+=`${i+1}. ${p.name} (#${p.code})\n   ${p.spec} × ${q} 盒 = $${q*p.price}\n\n`});t+=`──────────────\n合计: $${totalPrice()}\n数量: ${totalCount()} 盒\n──────────────\n\n谢谢！`;return t}
function sendWhatsApp(){window.open("https://wa.me/1234567890?text="+encodeURIComponent(buildOrderText()),"_blank")}
function copyOrder(){const t=buildOrderText();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>{toast("✅ 已复制！",true);document.querySelector(".copy-btn").textContent="✅ 已复制！";setTimeout(()=>document.querySelector(".copy-btn").textContent="📋 复制订单",2000)}).catch(()=>fallbackCopy(t))}else{fallbackCopy(t)}}
function fallbackCopy(t){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("✅ 已复制！",true)}catch(e){toast("⚠️ 复制失败")}document.body.removeChild(ta)}
function toast(msg,important){const t=document.getElementById("toast");t.textContent=msg;t.className="toast"+(msg.includes("✅")?" success":"")+(msg.includes("⚠️")?" error":"");t.classList.add("show");clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove("show"),important?2500:1800)}

render();updateUI();
